version: 2

project_name: comrade

before:
  hooks:
    - go mod tidy

builds:
  - id: comrade
    main: ./cmd/comrade
    binary: comrade
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: comrade
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

# release: this repo has no git remote configured yet (a fresh clone
# with no `origin` would otherwise leave goreleaser to guess), so the
# GitHub repository is named explicitly rather than inferred from `git
# remote get-url origin` — matches scripts/install.sh/install.ps1's own
# hardcoded REPO="firatkutay/cli-comrade".
release:
  github:
    owner: firatkutay
    name: cli-comrade

# --- Homebrew tap (macOS/Linux) — DISABLED for v0.1.0 ----------------------
# `brews:` (Homebrew Formula) is deprecated as of goreleaser v2.16 in
# favor of `homebrew_casks:` (Homebrew Cask) — see
# https://goreleaser.com/deprecations#brews; `goreleaser check` fails on
# a deprecated key, so the block below (kept commented, not deleted, so
# it is ready to re-enable) uses the current, non-deprecated form.
#
# Disabled because github.com/firatkutay/homebrew-tap does not exist yet
# (verified via `gh repo view firatkutay/homebrew-tap` during the v0.1.0
# preflight — GraphQL: could not resolve to a Repository). A real
# `goreleaser release` run publishing this section would fail outright
# (push target 404s) and take the whole release down with it — every
# publisher in a single goreleaser run is all-or-nothing for that run's
# success. Re-enable once the target repo exists, empty, AND either (a)
# GITHUB_TOKEN has cross-repo write access to it (only true if it's
# owned by this same account/org with no extra branch protection), or
# (b) a PAT with `repo` scope on it is set as the HOMEBREW_TAP_GITHUB_TOKEN
# secret and referenced via the commented `repository.token:` line below.
#
# homebrew_casks:
#   - name: comrade
#     repository:
#       owner: firatkutay
#       name: homebrew-tap
#       # token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
#     directory: Casks
#     homepage: "https://github.com/firatkutay/cli-comrade"
#     description: "Cross-platform AI CLI companion for the terminal (TR/EN)."

