name: Release

# Runs goreleaser against a pushed "vX.Y.Z" tag — the second half of the
# supply-chain-pinning "release two-gate rule": the tag push (git side)
# and this workflow's artifact publish are independent gates, both
# required before a release is considered done.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # goreleaser refuses to run against a shallow clone (it walks
          # tag history for the changelog pipe even though ours is
          # disabled, and to resolve {{.Tag}}/{{.PreviousTag}}).
          fetch-depth: 0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      # Installs the cosign CLI that .goreleaser.yaml's `signs:` block
      # invokes to key-based sign checksums.txt. Action pinned to a full
      # commit SHA (sigstore/cosign-installer v4.1.2, released 2026-05-07 —
      # matches this repo's existing convention of SHA-pinning every
      # `uses:` step, see actions/checkout and actions/setup-go above).
      #
      # cosign-release is pinned to v2.6.3, NOT the newer v2.6.4: v2.6.4
      # was published 2026-07-17, six days before this change (younger
      # than the house ≥15-day release-age floor), and its changelog is an
      # OCI-manifest/attestation-download backport with no security
      # content for the sign-blob path this repo uses. v2.6.3 (published
      # 2026-04-06, well past 15 days) additionally resolves
      # GHSA-w6c6-c85g-mmv6 relative to earlier 2.6.x releases, so it is
      # both the aging-eligible and the more conservative choice — adopt
      # v2.6.4 later once it has cleared the 15-day floor.
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v2.6.3"

      # Source SBOM, attached to the release alongside goreleaser's own
      # archives/checksums — this repo ships no container image, so
      # there is no separate "container SBOM" to also generate (see
      # security-scanning's SBOM-bundle rule; a source-only SBOM is the
      # right and complete scope for a binary-only Go CLI release).
      #
      # output-file MUST resolve outside the checked-out repo — writing
      # it in-workspace (as a bare "sbom-source.cdx.json" relative path
      # did previously) leaves an untracked file that fails goreleaser's
      # `git status --porcelain` cleanliness check ("git is in a dirty
      # state") before the release even starts (observed on the v0.1.0
      # tag's first run: https://github.com/firatkutay/cli-comrade/actions/runs/29113017395).
      # ${{ runner.temp }} is the GitHub Actions-provided scratch
      # directory, a sibling of (not nested under) github.workspace, so
      # this file is invisible to git entirely — belt-and-suspenders
      # with the /sbom-*.cdx.json .gitignore entry, which only matters
      # if a future edit points output-file back inside the workspace.
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ runner.temp }}/sbom-source.cdx.json
          upload-release-assets: false
          upload-artifact: false

      # Derives the GitHub Release body from CHANGELOG.md's own
      # `## [<version>] - <date>` section (Derive-or-Guard: CHANGELOG.md
      # is the single source of truth for release notes; this step reads
      # it rather than hand-maintaining a second copy in this workflow or
      # relying on goreleaser's own commit-log changelog generator, which
      # is deliberately disabled in .goreleaser.yaml's `changelog:` block).
      # Fails the job loudly (rather than silently shipping an empty
      # release body) if the tagged version has no matching CHANGELOG
      # section — that means CHANGELOG.md wasn't cut before tagging.
      - name: Extract release notes from CHANGELOG.md
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            BEGIN { pat = "^## \\[" ver "\\]" }
            $0 ~ pat { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::CHANGELOG.md has no '## [$version] - ...' section — cut the changelog before tagging." >&2
            exit 1
          fi

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          # Exact pin, not a "~> v2.16" range: the v0.1.1 incident was
          # diagnosed by downloading v2.16.0's actual source and reading
          # internal/client/client.go + internal/tmpl/tmpl.go's
          # ApplySingleEnvOnly (see .goreleaser.yaml's repository.token
          # comment) — that diagnosis is only guaranteed to hold for
          # this exact build. A floating range could silently pick up a
          # later 2.16.x patch whose template internals differ from what
          # was verified here.
          version: "2.16.0"
          args: release --clean --release-notes=/tmp/release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # homebrew_casks/scoops/winget in .goreleaser.yaml are always
          # active and each self-gates via its own templated
          # `skip_upload: "{{ not (isEnvSet \"...\") }}"` — a channel
          # degrades to "build the manifest locally, don't push it"
          # instead of failing the whole release when its PAT is absent
          # (see the long comment in .goreleaser.yaml for the exact
          # mechanism and why it's `skip_upload`, not `disable`).
          #
          # These three MUST always be set here, even to an empty string
          # (which is exactly what `${{ secrets.X }}` renders to when the
          # named secret doesn't exist on this repo — referencing an
          # undefined secret never fails a workflow). Leaving one of
          # these lines out entirely — rather than letting it resolve to
          # "" — would make the env var wholly ABSENT from the process
          # environment instead of present-but-empty, which matters:
          # goreleaser's template engine runs Go's text/template with
          # `Option("missingkey=error")`, so a raw `.Env.VAR` reference
          # to a truly-unset key would error out — except that in
          # practice it never gets the chance to: `.goreleaser.yaml`'s
          # `repository.token:` field is only ever templated once
          # `skip_upload` has already resolved to "false", which itself
          # requires the var to be present AND non-empty (see
          # .goreleaser.yaml for the exact doPublish() ordering this
          # relies on). Keep setting all three unconditionally anyway —
          # it's what CI actually exercises and keeps that ordering
          # argument from being the only thing standing between a typo
          # here and a broken release.
          #
          # Add each PAT once you've completed the matching step in
          # docs/PACKAGING.md:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          # Consumed by .goreleaser.yaml's `signs:` block
          # (--key=env://COSIGN_PRIVATE_KEY) to key-based sign
          # checksums.txt offline (--tlog-upload=false, no Rekor). Both
          # secrets are required for the signs pipe to succeed; unlike the
          # three packaging PATs above, signing has no skip_upload-style
          # degrade-gracefully path, so a missing secret here fails the
          # release rather than silently skipping the .sig asset.
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
