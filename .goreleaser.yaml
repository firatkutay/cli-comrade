version: 2

project_name: comrade

before:
  hooks:
    - go mod tidy

builds:
  - id: comrade
    main: ./cmd/comrade
    binary: comrade
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: comrade
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

# release: this repo has no git remote configured yet (a fresh clone
# with no `origin` would otherwise leave goreleaser to guess), so the
# GitHub repository is named explicitly rather than inferred from `git
# remote get-url origin` — matches scripts/install.sh/install.ps1's own
# hardcoded REPO="firatkutay/cli-comrade".
release:
  github:
    owner: firatkutay
    name: cli-comrade

# --- Homebrew tap / Scoop bucket / winget: never-break gating --------------
#
# All three blocks below are ALWAYS ACTIVE (not commented out) — each is
# individually gated with its own `skip_upload:` template so a MISSING
# credential degrades that one channel to "build the manifest locally,
# don't push it" instead of failing the whole `goreleaser release` run.
# This is the fix for the v0.1.0 all-or-nothing failure: every publisher
# used to run unconditionally, so one missing secret took the entire
# release down with it (https://github.com/firatkutay/cli-comrade/actions/runs/29113017395-era
# incident). See docs/PACKAGING.md for the per-channel activation steps.
#
# Mechanism (verified against goreleaser v2.16.0's actual source, not
# assumed): none of homebrew_casks/scoops/winget has a top-level
# `disable:` field — only `snapcrafts` does (used below). The correct
# lever for these three is `skip_upload`, which is templated and, per
# internal/pipe/{cask,scoop,winget}/*.go, resolves to a `pipe.Skip(...)`
# at the PUBLISH stage when its rendered value is the string "true" —
# `pipe.Skip` is goreleaser's standard "not an error, just not applicable
# this run" signal and does not fail the release. `isEnvSet` is a real
# builtin template func (confirmed present in v2.16.0's internal/tmpl/tmpl.go)
# that returns false for both an empty AND a wholly-unset env var, so:
#
#   skip_upload: "{{ not (isEnvSet \"HOMEBREW_TAP_TOKEN\") }}"
#
# renders to "true" (skip) whenever the token is absent or empty, and
# "false" (publish for real) once it's set to a non-empty value in CI.
#
# The `repository.token:` field MUST be plain `{{ .Env.VAR }}` — nothing
# else. This was gotten wrong in v0.1.1 (`envOrDefault "VAR" ""`) and
# broke the release: `repository.token` for homebrew_casks/scoops/winget
# is NOT rendered by the general-purpose template engine that backs
# `skip_upload` above (that one does register `envOrDefault`/`isEnvSet`
# as real Funcs). It is rendered by a SEPARATE, restricted evaluator:
# client.NewIfToken() (internal/client/client.go) calls
# tmpl.Template.ApplySingleEnvOnly(), which parses with
# `template.New("tmpl").Option("missingkey=error").Parse(s)` and
# registers NO FuncMap at all, then rejects anything that doesn't match
# `^{{\s*\.Env\.[^.\s}]+\s*}}$` via regex — so `envOrDefault "VAR" ""`
# fails with "function \"envOrDefault\" not defined" the instant it's
# evaluated (confirmed against the actual v2.16.0 source: no
# `envOrDefault`/`isEnvSet`/any custom func exists in ApplySingleEnvOnly's
# FuncMap; only `.Env.VAR` — literally that shape, no functions, no
# extra whitespace beyond `\s*` — is accepted). Plain `{{ .Env.VAR }}` is
# therefore the ONLY valid form here, not a stylistic alternative.
#
# This does not reopen the "abort on a truly-unset var" risk the old
# comment worried about, because of evaluation ORDER, verified from
# internal/pipe/{cask,scoop,winget}/*.go's doPublish(): the
# `skip_upload == "true"` check runs and returns `pipe.Skip(...)` BEFORE
# `client.NewIfToken()` (and hence before `.Env.VAR` is ever touched).
# And `isEnvSet` (which drives skip_upload) is false for BOTH an empty
# AND a wholly-absent var, so the token template is only ever reached
# when the var is present *and* non-empty — `.Env.VAR` map access can't
# missingkey-error in that case, present or not: the key is always in
# the map by construction. .github/workflows/release.yml also always
# sets these three env vars (empty string when the GitHub secret is
# absent), so in CI the key is always present in `.Env` regardless.
homebrew_casks:
  - name: comrade
    repository:
      owner: firatkutay
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/firatkutay/cli-comrade"
    description: "Cross-platform AI CLI companion for the terminal (TR/EN)."
    skip_upload: "{{ not (isEnvSet \"HOMEBREW_TAP_TOKEN\") }}"

scoops:
  - name: comrade
    repository:
      owner: firatkutay
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/firatkutay/cli-comrade"
    description: "Cross-platform AI CLI companion for the terminal (TR/EN)."
    license: MIT
    skip_upload: "{{ not (isEnvSet \"SCOOP_BUCKET_TOKEN\") }}"

# winget publishes by pushing a branch to a FORK of microsoft/winget-pkgs
# (repository.owner/name below = the fork, created manually — see
# docs/PACKAGING.md) and opening a PR from that branch to the real
# microsoft/winget-pkgs (pull_request.base). goreleaser does not create
# the fork itself.
winget:
  - name: comrade
    publisher: "Fırat Kutay"
    short_description: "Cross-platform AI CLI companion for the terminal (TR/EN)."
    license: "MIT"
    homepage: "https://github.com/firatkutay/cli-comrade"
    package_identifier: cli.comrade
    repository:
      owner: firatkutay
      name: winget-pkgs
      branch: "comrade-{{ .Version }}"
      token: "{{ .Env.WINGET_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    skip_upload: "{{ not (isEnvSet \"WINGET_TOKEN\") }}"

# --- .deb / .rpm (nfpm) ------------------------------------------------------
nfpms:
  - id: comrade
    package_name: comrade
    file_name_template: "{{ .ConventionalFileName }}"
    homepage: "https://github.com/firatkutay/cli-comrade"
    maintainer: "Fırat Kutay <firat.kutay@gmail.com>"
    description: "Cross-platform AI CLI companion for the terminal (TR/EN)."
    license: MIT
    section: utils
    formats:
      - deb
      - rpm

# --- Snap (Ubuntu / Snap Store) — PERMANENTLY DISABLED here, built elsewhere -
#
# This block documents the intended package shape (name, confinement,
# grade, base, app) but is NEVER meant to actually run through
# `goreleaser release`, for two independent reasons goreleaser's own
# docs confirm:
#   1. "GoReleaser will not install snapcraft nor any of its
#      dependencies for you" (goreleaser.com/customization/package/snapcraft) —
#      the release job's runner has no snapcraft binary.
#   2. "Snapcraft packages can't be built inside a Docker container" —
#      even if snapcraft were installed, LXD-based snap builds need a
#      real (non-containerized) VM, which this repo's shared release
#      job topology does not guarantee.
# `disable: true` is hardcoded (NOT templated on a secret, unlike the
# three publishers above) because there is no secret that would ever
# make it safe to flip this on inside the main release job — per
# internal/pipe/snapcraft/snapcraft.go, the `disable` check runs FIRST
# in the pipe, before it even calls exec.LookPath("snapcraft"), so this
# unconditionally short-circuits to a clean pipe.Skip and never touches
# the (absent) snapcraft binary.
#
# The REAL snap build + publish path is the separate, native-runner
# workflow .github/workflows/snap.yml (snapcore/action-build +
# snapcore/action-publish), driven by the standalone snap/snapcraft.yaml
# — NOT by this block. Known, accepted duplication: this block's
# metadata (summary/description/license/confinement/grade/base) and
# snap/snapcraft.yaml's are two hand-maintained copies of the same
# facts. Normally that's an unguarded-mirror defect (see the
# Derive-or-Guard house rule), but because this block is permanently
# inert (disable: true, never executed), drift here has zero runtime
# effect — it can only go stale as documentation, not break a build.
# Flagged for the reviewer rather than silently accepted; a `task
# lint:snap-drift` comparing the two is a reasonable follow-up if this
# repo ever wants goreleaser to also validate the metadata matches.
snapcrafts:
  - name: cli-comrade
    title: comrade
    summary: "Cross-platform AI CLI companion for the terminal (TR/EN)."
    description: |
      comrade helps users without deep terminal knowledge run and
      troubleshoot commands: it analyzes errors, proposes commands under
      configurable modes (auto/ask/info), and never runs destructive
      operations without confirmation.
    license: MIT
    confinement: classic
    grade: stable
    base: core24
    apps:
      comrade:
        command: comrade
    disable: true

# --- Supply-chain signing (enablement note, not wired) ----------------------
# cosign signing of checksums.txt (which covers every other artifact
# transitively, since checksums.txt lists their digests) is NOT enabled
# here: it requires a cosign key pair (or keyless/Fulcio+Rekor OIDC
# signing) provisioned in CI secrets, which this repo does not have yet.
# Enable by uncommenting the block below once COSIGN_PASSWORD (and either
# a committed cosign.pub + a COSIGN_PRIVATE_KEY secret, or keyless OIDC
# signing in the release workflow) exist:
#
# signs:
#   - cmd: cosign
#     stdin: "{{ .Env.COSIGN_PASSWORD }}"
#     args:
#       - sign-blob
#       - "--key=cosign.key"
#       - "--output-signature=${signature}"
#       - "${artifact}"
#       - "--yes"
#     artifacts: checksum
